<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كناشي Pro - نظام التوثيق الزمني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc; --white: #ffffff; --blue: #2563eb;
            --red: #ef4444; --green: #22c55e; --orange: #f59e0b;
            --slate: #64748b; --dark: #0f172a; --radius: 18px;
        }
        body { font-family: "Segoe UI", Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--dark); line-height: 1.5; }
        .app-wrapper { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        
        .ai-dashboard { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 20px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box small { display: block; color: #94a3b8; font-size: 0.8rem; margin-bottom: 4px; }
        .stat-box b { font-size: 1.2rem; }

        .group-section { background: var(--white); border-radius: var(--radius); margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        .group-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #f8fafc; font-weight: bold; border-bottom: 1px solid #e2e8f0; }
        .students-list { display: none; padding: 15px; }
        .students-list.open { display: block; }

        .student-card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 5px solid var(--green); }
        .student-card.has-debt { border-right-color: var(--red); background: #fff5f5; }
        
        .attendance-boxes { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .box { 
            width: 42px; height: 42px; border-radius: 8px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            font-weight: bold; border: 2px solid #cbd5e1; background: #fff; 
            color: #64748b; font-size: 0.9rem; position: relative;
        }
        .box.present { background: var(--green); color: white; border-color: var(--green); }
        .box.absent { background: var(--red); color: white; border-color: var(--red); }
        .box .date-tooltip { font-size: 0.5rem; opacity: 0.8; font-weight: normal; }

        .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-act { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-family: inherit; }
        .btn-pay { background: var(--blue); grid-column: span 3; margin-top: 5px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--white); padding: 25px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="ai-dashboard">
        <h3 style="margin:0;"><i class="fas fa-history"></i> السجل الزمني والمالي</h3>
        <div class="stats-grid">
            <div class="stat-box"><small>السيولة</small><b id="stat-cash" style="color:#86efac;">0 دج</b></div>
            <div class="stat-box"><small>الديون</small><b id="stat-debt" style="color:#f87171;">0 دج</b></div>
        </div>
    </div>
    <div id="groups-container"></div>
</div>

<div id="renew-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>دورة جديدة</h3>
        <p style="color:var(--slate);">هذه الحصة الأولى، يرجى تحديد طريقة الدفع:</p>
        <button class="btn-act" style="background:var(--green); width:100%; margin-bottom:10px; padding:15px;" onclick="processRenewal(true)">دفع كامل (كاش)</button>
        <button class="btn-act" style="background:var(--red); width:100%; margin-bottom:10px; padding:15px;" onclick="processRenewal(false)">قيد كدين</button>
        <button class="btn-act" style="background:var(--slate); width:100%; padding:15px;" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
    const DB_NAME = "kanashi_db";
    const DB_VERSION = 2;
    const STORE_STUDENTS = "students";
    const STORE_GROUPS = "groups";
    
    let db = null;
    let pendingData = null;
    let openGroupId = null;

    function openDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = (e) => { db = e.target.result; resolve(); };
        });
    }

    async function getData(store) {
        return new Promise(res => {
            const tx = db.transaction(store, "readonly");
            const req = tx.objectStore(store).getAll();
            req.onsuccess = () => res(req.result);
        });
    }

    async function saveData(store, item) {
        return new Promise(res => {
            const tx = db.transaction(store, "readwrite");
            const req = tx.objectStore(store).put(item);
            req.onsuccess = () => res();
        });
    }

    async function renderUI() {
        const groups = await getData(STORE_GROUPS);
        const students = await getData(STORE_STUDENTS);
        const container = document.getElementById("groups-container");
        
        let totalCash = 0, totalDebt = 0;
        students.forEach(s => { 
            totalCash += Number(s.paid || 0); 
            totalDebt += Number(s.debt || 0); 
        });
        document.getElementById("stat-cash").innerText = totalCash.toLocaleString() + " دج";
        document.getElementById("stat-debt").innerText = totalDebt.toLocaleString() + " دج";

        container.innerHTML = groups.map(g => {
            const gSt = students.filter(s => s.group === g.name);
            const isOpen = openGroupId == g.id;
            const maxS = g.sessionsCount || 4;

            const cards = gSt.map(s => {
                let att = Array.isArray(s.attendance) ? s.attendance : Array(maxS).fill("");
                if(att.length !== maxS) {
                    let newAtt = Array(maxS).fill("");
                    att.forEach((v, i) => { if(i < maxS) newAtt[i] = v; });
                    att = newAtt;
                }

                const isD = Number(s.debt || 0) > 0;
                const boxesHtml = att.map((v, i) => {
                    // معالجة ذكية: هل هي بيانات قديمة (نص) أم جديدة (كائن)؟
                    const status = (typeof v === 'object' && v !== null) ? v.status : v;
                    const dateStr = (typeof v === 'object' && v !== null) ? v.date : "";
                    
                    return `
                        <div class="box ${status}" title="${dateStr}">
                            <span>${i+1}</span>
                            ${dateStr ? `<span class="date-tooltip">${dateStr.split('/')[0]}/${dateStr.split('/')[1]}</span>` : ''}
                        </div>`;
                }).join("");

                return `
                    <div class="student-card ${isD ? 'has-debt' : ''}">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${s.name}</b>
                            <span style="color:${isD?'var(--red)':'var(--green)'}; font-weight:bold;">${isD ? s.debt+' دج' : 'خالص'}</span>
                        </div>
                        <div class="attendance-boxes">${boxesHtml}</div>
                        <div class="actions">
                            <button class="btn-act" style="background:var(--green)" onclick="handleMark(${s.id}, ${g.id}, 'present')">حاضر</button>
                            <button class="btn-act" style="background:var(--red)" onclick="handleMark(${s.id}, ${g.id}, 'absent')">غائب</button>
                            <button class="btn-act" style="background:var(--slate)" onclick="handleUndo(${s.id}, ${g.id})">تراجع</button>
                            ${isD ? `<button class="btn-act btn-pay" onclick="payFull(${s.id})">تسوية كامل الدين</button>` : ''}
                        </div>
                    </div>`;
            }).join("");

            return `
                <div class="group-section">
                    <div class="group-header" onclick="toggle(${g.id})">
                        <span>${g.name} (${gSt.length})</span>
                        <i class="fas fa-chevron-${isOpen?'up':'down'}"></i>
                    </div>
                    <div class="students-list ${isOpen ? 'open' : ''}">${cards}</div>
                </div>`;
        }).join("");
    }

    async function handleMark(stId, gId, status) {
        const students = await getData(STORE_STUDENTS);
        const s = students.find(x => x.id === stId);
        const groups = await getData(STORE_GROUPS);
        const g = groups.find(x => x.id === gId);

        // التحقق من الدورة الجديدة
        const isEmpty = !s.attendance || s.attendance.every(v => {
            const val = (typeof v === 'object' && v !== null) ? v.status : v;
            return val === "";
        });

        if(isEmpty) {
            pendingData = { stId, gId, status };
            document.getElementById("renew-modal").style.display = "flex";
            return;
        }

        executeMark(s, g, status);
    }

    async function executeMark(s, g, status) {
        let idx = s.attendance.findIndex(v => {
            const val = (typeof v === 'object' && v !== null) ? v.status : v;
            return val === "";
        });

        if(idx === -1) return; // الحصص ممتلئة

        s.attendance[idx] = {
            status: status,
            date: new Date().toLocaleDateString('ar-DZ'),
            timestamp: Date.now()
        };

        if(s.paymentMode === "debt") {
            s.debt = (Number(s.debt)||0) + Math.round(Number(g.price)/(g.sessionsCount || 4));
        }

        await saveData(STORE_STUDENTS, s);
        renderUI();
    }

    async function processRenewal(isCash) {
        const students = await getData(STORE_STUDENTS);
        const s = students.find(x => x.id === pendingData.stId);
        const groups = await getData(STORE_GROUPS);
        const g = groups.find(x => x.id === pendingData.gId);
        const maxS = g.sessionsCount || 4;

        s.attendance = Array(maxS).fill("");
        if(isCash) {
            s.paid = (Number(s.paid)||0) + Number(g.price);
            s.debt = 0;
            s.paymentMode = "cash";
        } else {
            s.paymentMode = "debt";
        }

        closeModal();
        executeMark(s, g, pendingData.status);
    }

    async function handleUndo(stId, gId) {
        const students = await getData(STORE_STUDENTS);
        const s = students.find(x => x.id === stId);
        const groups = await getData(STORE_GROUPS);
        const g = groups.find(x => x.id === gId);

        for(let i = s.attendance.length - 1; i >= 0; i--) {
            const v = s.attendance[i];
            const status = (typeof v === 'object' && v !== null) ? v.status : v;
            if(status !== "") {
                if(s.paymentMode === "debt") {
                    s.debt = Math.max(0, (Number(s.debt)||0) - Math.round(Number(g.price)/(g.sessionsCount || 4)));
                }
                s.attendance[i] = "";
                break;
            }
        }
        await saveData(STORE_STUDENTS, s);
        renderUI();
    }

    async function payFull(stId) {
        const students = await getData(STORE_STUDENTS);
        const s = students.find(x => x.id === stId);
        s.paid = (Number(s.paid)||0) + (Number(s.debt)||0);
        s.debt = 0;
        s.paymentMode = "cash";
        await saveData(STORE_STUDENTS, s);
        renderUI();
    }

    function toggle(id) { openGroupId = (openGroupId === id) ? null : id; renderUI(); }
    function closeModal() { document.getElementById("renew-modal").style.display = "none"; }

    openDB().then(() => renderUI());
</script>
</body>
</html>
