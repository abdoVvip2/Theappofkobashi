<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التحليل المالي - كناشي Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f1f5f9; --white: #ffffff; --dark: #0f172a;
            --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
            --blue: #3b82f6; --slate: #64748b; --radius: 20px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--dark); overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { font-size: 1.3rem; margin: 0; display: flex; align-items: center; gap: 8px; }
        .close-btn { text-decoration: none; background: #e2e8f0; color: var(--dark); padding: 8px 15px; border-radius: 12px; font-weight: bold; font-size: 0.85rem; }

        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .kpi-card { background: var(--white); padding: 20px 15px; border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; }
        .kpi-card::before { content: ''; position: absolute; top: 0; right: 0; width: 5px; height: 100%; }
        .kpi-card.income::before { background: var(--green); }
        .kpi-card.expense::before { background: var(--red); }
        .kpi-card.net::before { background: var(--blue); }
        .kpi-card.debt::before { background: var(--orange); }
        
        .kpi-card small { display: block; color: var(--slate); font-size: 0.8rem; margin-bottom: 8px; font-weight: 500; }
        .kpi-card b { font-size: 1.15rem; color: var(--dark); letter-spacing: -0.5px; }

        /* Sections */
        .card { background: var(--white); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card-title { font-weight: 800; font-size: 1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--dark); }

        /* Form */
        .expense-form { display: flex; flex-direction: column; gap: 10px; }
        .inp { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; background: #f8fafc; font-family: inherit; }
        .inp:focus { border-color: var(--blue); background: #fff; }
        .btn-add { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-add:active { transform: scale(0.98); opacity: 0.9; }

        /* List */
        .expense-list { margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px; }
        .expense-item span { font-weight: 500; color: var(--slate); }
        .expense-item b { color: var(--red); }
        .del-btn { color: #cbd5e1; border: none; background: none; font-size: 1.2rem; padding: 5px; cursor: pointer; }

        /* Chart */
        .chart-box { display: flex; flex-direction: column; align-items: center; padding: 10px 0; }
        .legend { width: 100%; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .leg-item { display: flex; justify-content: space-between; padding: 10px; border-radius: 10px; font-size: 0.85rem; font-weight: bold; }

        /* AI Insight */
        .ai-box { background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1px solid #fde68a; }
        .ai-tip { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #f59e0b; font-size: 0.9rem; color: #92400e; }

        .btn-print { width: 100%; background: #334155; color: white; padding: 16px; border-radius: var(--radius); border: none; font-weight: 800; font-size: 1rem; margin: 10px 0 30px 0; }
        
        @media print { .btn-print, .expense-form, .close-btn, .del-btn { display: none; } }
    </style>
</head>
<body>

<div class="header">
    <h2><i class="fas fa-chart-pie" style="color:var(--blue)"></i> لوحة التحليل المالي</h2>
    <a href="index.html" class="close-btn">إغلاق</a>
</div>

<div class="kpi-grid">
    <div class="kpi-card income"><small>إجمالي المداخيل</small><b id="kpiIncome">0</b></div>
    <div class="kpi-card expense"><small>إجمالي المصاريف</small><b id="kpiExpenses">0</b></div>
    <div class="kpi-card net"><small>صافي الربح</small><b id="kpiNet">0</b></div>
    <div class="kpi-card debt"><small>ديون في الخارج</small><b id="kpiDebt" style="color:var(--orange)">0</b></div>
</div>

<div class="card">
    <div class="card-title"><i class="fas fa-minus-circle" style="color:var(--red)"></i> تسجيل مصاريف جديدة</div>
    <div class="expense-form">
        <input type="text" id="expName" class="inp" placeholder="البيان (كراء، كهرباء...)">
        <input type="number" id="expAmount" class="inp" placeholder="المبلغ (دج)">
        <button class="btn-add" onclick="handleAddExpense()">إضافة المصروف</button>
    </div>
    <div id="expenseList" class="expense-list"></div>
</div>

<div class="card">
    <div class="card-title"><i class="fas fa-balance-scale" style="color:var(--orange)"></i> تحليل توزيع السيولة</div>
    <div class="chart-box">
        <canvas id="pieCanvas" width="160" height="160" style="width:160px; height:160px;"></canvas>
        <div class="legend">
            <div class="leg-item" style="background:#f0fdf4; color:var(--green);"><span>أرباح:</span><span id="pNetText">0%</span></div>
            <div class="leg-item" style="background:#fef2f2; color:var(--red);"><span>تكاليف:</span><span id="pExpText">0%</span></div>
            <div class="leg-item" style="background:#fff7ed; color:var(--orange); grid-column: span 2;"><span>ديون عالقة:</span><span id="pDebtText">0%</span></div>
        </div>
    </div>
</div>

<div class="card ai-box" id="aiBox">
    <b>جاري التحليل...</b>
</div>

<button class="btn-print" onclick="window.print()"><i class="fas fa-file-pdf"></i> استخراج تقرير PDF</button>

<script>
    const DB_NAME = "kanashi_db";
    const DB_VERSION = 2; // تم رفع الإصدار لضمان تحديث المخازن
    let db = null;

    // --- نظام قاعدة البيانات الموحد ---
    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            
            req.onupgradeneeded = (e) => {
                const database = e.target.result;
                // إنشاء جميع المخازن في حال عدم وجودها
                if (!database.objectStoreNames.contains("students")) database.createObjectStore("students", { keyPath: "id" });
                if (!database.objectStoreNames.contains("groups")) database.createObjectStore("groups", { keyPath: "id" });
                if (!database.objectStoreNames.contains("expenses")) database.createObjectStore("expenses", { keyPath: "id" });
            };

            req.onsuccess = (e) => { db = e.target.result; resolve(); };
            req.onerror = (e) => reject(e.target.error);
        });
    }

    async function fetchData(storeName) {
        return new Promise(res => {
            const tx = db.transaction(storeName, "readonly");
            const req = tx.objectStore(storeName).getAll();
            req.onsuccess = () => res(req.result);
        });
    }

    // --- العمليات ---
    async function handleAddExpense() {
        const name = document.getElementById("expName").value.trim();
        const amount = Number(document.getElementById("expAmount").value);
        if (!name || !amount) return alert("يرجى ملء كافة الخانات");

        const tx = db.transaction("expenses", "readwrite");
        tx.objectStore("expenses").add({ id: Date.now(), name, amount });
        tx.oncomplete = () => {
            document.getElementById("expName").value = "";
            document.getElementById("expAmount").value = "";
            refreshAll();
        };
    }

    async function deleteExpense(id) {
        if(!confirm("هل تريد حذف هذا المصروف؟")) return;
        const tx = db.transaction("expenses", "readwrite");
        tx.objectStore("expenses").delete(id);
        tx.oncomplete = refreshAll;
    }

    function fmt(n) { return Number(n).toLocaleString("fr-DZ") + " دج"; }

    async function refreshAll() {
        const students = await fetchData("students");
        const expenses = await fetchData("expenses");

        let income = 0, debt = 0;
        students.forEach(s => { 
            income += Number(s.paid || 0); 
            debt += Number(s.debt || 0); 
        });

        let expTotal = 0;
        expenses.forEach(e => expTotal += e.amount);

        const net = income - expTotal;
        const totalVolume = income + debt;

        // تحديث الأرقام
        document.getElementById("kpiIncome").innerText = fmt(income);
        document.getElementById("kpiExpenses").innerText = fmt(expTotal);
        document.getElementById("kpiNet").innerText = fmt(net);
        document.getElementById("kpiDebt").innerText = fmt(debt);

        // قائمة المصاريف
        document.getElementById("expenseList").innerHTML = expenses.length ? expenses.map(e => `
            <div class="expense-item">
                <span>${e.name}</span>
                <b>-${fmt(e.amount)}</b>
                <button class="del-btn" onclick="deleteExpense(${e.id})"><i class="fas fa-trash-alt"></i></button>
            </div>`).join("") : '<div style="text-align:center; color:var(--slate); padding:10px;">لا يوجد مصاريف مسجلة</div>';

        // الحسابات المئوية للرسم البياني
        const netPct = totalVolume > 0 ? Math.max(0, Math.round((net/totalVolume)*100)) : 0;
        const expPct = totalVolume > 0 ? Math.round((expTotal/totalVolume)*100) : 0;
        const debtPct = totalVolume > 0 ? Math.round((debt/totalVolume)*100) : 0;

        document.getElementById("pNetText").innerText = netPct + "%";
        document.getElementById("pExpText").innerText = expPct + "%";
        document.getElementById("pDebtText").innerText = debtPct + "%";
        
        drawPie(netPct, expPct, debtPct);
        updateAI(net, debtPct, students.length);
    }

    function drawPie(n, e, d) {
        const canvas = document.getElementById("pieCanvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, 160, 160);
        let start = -Math.PI/2;
        const total = n + e + d || 1;
        const colors = ["#22c55e", "#ef4444", "#f59e0b"];
        [n, e, d].forEach((val, i) => {
            const angle = (val/total) * 2 * Math.PI;
            if(angle <= 0) return;
            ctx.fillStyle = colors[i];
            ctx.beginPath(); ctx.moveTo(80, 80);
            ctx.arc(80, 80, 75, start, start + angle);
            ctx.fill(); start += angle;
        });
        // الدائرة الداخلية البيضاء (Donut Style)
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(80, 80, 45, 0, 7); ctx.fill();
    }

    function updateAI(net, debtPct, count) {
        const box = document.getElementById("aiBox");
        let status = net < 0 ? "🔴 خسارة مالية مؤقتة" : (net < 5000 ? "🟡 الأرباح حرجة" : "🟢 وضع مالي مستقر");
        let advice = debtPct > 20 ? `هناك ${debtPct}% من أموالك "ديون". تحصيلها سيغير وضعك تماماً.` : "إدارة الديون لديك ممتازة حالياً.";
        box.innerHTML = `<b>الحالة العامة: ${status}</b><div class="ai-tip">${advice}</div>`;
    }

    // التشغيل الأولي
    openDB().then(refreshAll).catch(err => alert("خطأ في قاعدة البيانات: " + err));
</script>
</body>
</html>
